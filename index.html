<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Guess The Flag</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  background: linear-gradient(180deg, #0f2027, #203a43, #2c5364);
  color: white;
}

/* НЕБО */
.sky {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* ЛУНА */
.moon {
  position: absolute;
  top: 60px;
  right: 100px;
  width: 90px;
  height: 90px;
  background: radial-gradient(circle, #fff, #ddd);
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(255,255,255,0.7);
}

/* ОБЛАКА */
.cloud {
  position: absolute;
  background: #ffffff20;
  border-radius: 50%;
  filter: blur(20px);
}

.cloud1 {
  width: 200px;
  height: 60px;
  top: 100px;
  left: -200px;
  animation: moveClouds 35s linear infinite;
}

.cloud2 {
  width: 300px;
  height: 80px;
  top: 180px;
  left: -300px;
  animation: moveClouds 50s linear infinite;
}

.cloud3 {
  width: 250px;
  height: 70px;
  top: 250px;
  left: -250px;
  animation: moveClouds 40s linear infinite;
}

@keyframes moveClouds {
  from { transform: translateX(0); }
  to { transform: translateX(150vw); }
}

/* ПОЛЕ */
.field {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(to top, #0b3d2e, transparent);
}

/* АМБАР */
.barn {
  position: absolute;
  bottom: 60px;
  left: 60%;
  width: 120px;
  height: 80px;
  background: #111;
  clip-path: polygon(0% 100%, 0% 40%, 50% 0%, 100% 40%, 100% 100%);
}

/* ЭКРАНЫ */
.screen {
  display: none;
}

.active {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* КАРТОЧКА */
.card {
  position: relative;
  z-index: 2;
  background: rgba(47,47,79,0.85);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  width: 320px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

/* КНОПКИ */
button {
  width: 100%;
  margin: 8px 0;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  background: #3d3d6b;
  color: white;
  transition: 0.3s;
}

button:hover {
  background: #6c63ff;
  transform: scale(1.05);
}

.correct {
  background: #4CAF50 !important;
}

.wrong {
  background: #f44336 !important;
}

.next-btn {
  background: #00c9a7;
}

/* ФЛАГ */
img {
  width: 200px;
  margin: 15px 0;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- ФОН -->
<div class="sky">
  <div class="moon"></div>
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="cloud cloud3"></div>
  <div class="field"></div>
  <div class="barn"></div>
</div>

<!-- СТАРТ -->
<div id="startScreen" class="screen active">
  <div class="card">
    <h1>🌍 Guess The Flag</h1>
    <button onclick="startGame()">Играть</button>
  </div>
</div>

<!-- ИГРА -->
<div id="gameScreen" class="screen">
  <div class="card">
    <h3 id="score">Счёт: 0</h3>
    <h3 id="lives">❤️❤️❤️</h3>
    <h3 id="timer">⏱️ 10</h3>

    <img id="flag">
    <div id="buttons"></div>
  </div>
</div>

<!-- КОНЕЦ -->
<div id="endScreen" class="screen">
  <div class="card">
    <h2>🏆 Игра окончена</h2>
    <h3 id="finalScore"></h3>
    <button onclick="startGame()">Играть снова</button>
  </div>
</div>

<script>
let questions = [
  { flag: "https://flagcdn.com/w320/kz.png", correct: "Казахстан", options: ["Россия","Казахстан","Турция","Китай"] },
  { flag: "https://flagcdn.com/w320/us.png", correct: "США", options: ["США","Канада","Франция","Германия"] },
  { flag: "https://flagcdn.com/w320/tr.png", correct: "Турция", options: ["Турция","Испания","Италия","Египет"] },
  { flag: "https://flagcdn.com/w320/fr.png", correct: "Франция", options: ["Италия","Франция","Бельгия","Нидерланды"] },
  { flag: "https://flagcdn.com/w320/de.png", correct: "Германия", options: ["Австрия","Германия","Бельгия","Польша"] },
  { flag: "https://flagcdn.com/w320/it.png", correct: "Италия", options: ["Италия","Мексика","Венгрия","Болгария"] },
  { flag: "https://flagcdn.com/w320/es.png", correct: "Испания", options: ["Испания","Португалия","Аргентина","Чили"] },
  { flag: "https://flagcdn.com/w320/cn.png", correct: "Китай", options: ["Китай","Вьетнам","Япония","Корея"] },
  { flag: "https://flagcdn.com/w320/jp.png", correct: "Япония", options: ["Япония","Южная Корея","Китай","Таиланд"] },
  { flag: "https://flagcdn.com/w320/kr.png", correct: "Южная Корея", options: ["Япония","Южная Корея","Китай","Сингапур"] },
  { flag: "https://flagcdn.com/w320/gb.png", correct: "Великобритания", options: ["Австралия","Новая Зеландия","Великобритания","Ирландия"] },
  { flag: "https://flagcdn.com/w320/ca.png", correct: "Канада", options: ["Канада","США","Австралия","Норвегия"] },
  { flag: "https://flagcdn.com/w320/br.png", correct: "Бразилия", options: ["Бразилия","Аргентина","Мексика","Колумбия"] },
  { flag: "https://flagcdn.com/w320/ar.png", correct: "Аргентина", options: ["Аргентина","Уругвай","Чили","Перу"] },
  { flag: "https://flagcdn.com/w320/au.png", correct: "Австралия", options: ["Австралия","Новая Зеландия","Великобритания","Канада"] },
  { flag: "https://flagcdn.com/w320/in.png", correct: "Индия", options: ["Индия","Пакистан","Бангладеш","Непал"] },
  { flag: "https://flagcdn.com/w320/ae.png", correct: "ОАЭ", options: ["ОАЭ","Саудовская Аравия","Катар","Кувейт"] },
  { flag: "https://flagcdn.com/w320/eg.png", correct: "Египет", options: ["Египет","Ирак","Сирия","Иордания"] },
  { flag: "https://flagcdn.com/w320/za.png", correct: "ЮАР", options: ["ЮАР","Кения","Нигерия","Марокко"] },
  { flag: "https://flagcdn.com/w320/mx.png", correct: "Мексика", options: ["Мексика","Италия","Иран","Бразилия"] }
];

let current = 0;
let score = 0;
let lives = 3;
let timer;
let timeLeft = 10;

function startGame() {
  score = 0;
  lives = 3;
  current = 0;
  shuffle(questions);
  showScreen("gameScreen");
  loadQuestion();
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function loadQuestion() {
  resetTimer();
  let q = questions[current];

  document.getElementById("flag").src = q.flag;
  document.getElementById("buttons").innerHTML = "";
  document.getElementById("score").innerText = "Счёт: " + score;
  document.getElementById("lives").innerText = "❤️".repeat(lives);

  q.options.forEach(option => {
    let btn = document.createElement("button");
    btn.innerText = option;

    btn.onclick = () => handleAnswer(btn, option, q.correct);

    document.getElementById("buttons").appendChild(btn);
  });
}

function handleAnswer(btn, option, correct) {
  clearInterval(timer);

  let allButtons = document.querySelectorAll("#buttons button");
  allButtons.forEach(b => b.disabled = true);

  if (option === correct) {
    score++;
    btn.classList.add("correct");
  } else {
    lives--;
    btn.classList.add("wrong");

    allButtons.forEach(b => {
      if (b.innerText === correct) {
        b.classList.add("correct");
      }
    });
  }

  setTimeout(nextQuestion, 1000);
}

function nextQuestion() {
  if (lives <= 0 || current >= questions.length - 1) {
    endGame();
    return;
  }
  current++;
  loadQuestion();
}

function endGame() {
  showScreen("endScreen");
  document.getElementById("finalScore").innerText = "Твой счёт: " + score;
}

function resetTimer() {
  clearInterval(timer);
  timeLeft = 10;
  document.getElementById("timer").innerText = "⏱️ " + timeLeft;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = "⏱️ " + timeLeft;

    if (timeLeft <= 0) {
      lives--;
      nextQuestion();
    }
  }, 1000);
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}
</script>

</body>
</html>
